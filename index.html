<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeverRender Labs</title>
    <meta name="description" content="Agent Assisted Creative Studio - Surreal-Futurist Macro-Diorama">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/svg+xml" href="favicon-svg.svg">
</head>
<body>
    <div class="macro-environment">
        <!-- Background plate for bokeh/blur -->
        <div class="background-plate"></div>
        
        <!-- Energy Conduits -->
        <div class="conduit-grid">
            <div class="conduit-line horizontal top"></div>
            <div class="conduit-line vertical left"></div>
            <div class="conduit-line horizontal bottom"></div>
            <div class="conduit-line vertical right"></div>
        </div>

        <!-- Central Crystalline Viewport -->
        <div class="viewport-container" id="main-viewport">
            <div class="glass-panel">
                <img src="yt-qr-code.svg" class="qr-code qr-left" alt="YouTube QR">
                <img src="Insta-qr-code.svg" class="qr-code qr-right" alt="Instagram QR">
                <header class="sys-header">
                    <div class="sys-status">
                        <span class="indicator blink"></span> SYSTEM STATUS: CEMENTED
                    </div>
                    <div class="sys-id">PROJECT_NEVERMORE</div>
                </header>

                <main class="content-matrix">
                    <h1 class="chromatic-aberration">NEVERRENDER LABS</h1>
                    <p class="subtitle">THE COMPLETE ARCHITECTURAL COMPENDIUM</p>
                    
                    <div class="terminal-box" id="terminal-interface">
                        <div class="terminal-header">
                            <span>> TERMINAL FOCUS</span>
                        </div>
                        <div class="terminal-body">
                            <p class="typewriter-text" id="typewriter"></p>
                            <span class="cursor">_</span>
                        </div>
                    </div>

                    <div class="action-matrix">
                        <button class="action-btn primary" id="init-sequence">INITIALIZE SEQUENCE</button>
                        <button class="action-btn secondary" id="view-archives">VIEW ARCHIVES</button>
                        <button class="action-btn secondary" id="contact-creator">CONTACT</button>
                    </div>
                </main>

                <footer class="sys-footer">
                    <div>COMPUTE: TUNED AMD 6800U</div>
                    <div class="text-pop">AESTHETIC: SURREAL-FUTURIST MACRO-DIORAMA</div>
                </footer>
            </div>
        </div>
    </div>
    <div class="video-modal" id="archive-modal">
        <div class="modal-backdrop"></div>
        <div class="modal-content glass-panel extended-modal">
            <header class="sys-header">
                <div class="sys-id">ARCHIVE_PLAYBACK</div>
                <button class="close-btn" id="close-modal">[X] CLOSE</button>
            </header>
            <div class="archive-layout">
                <div class="playlist-sidebar">
                    <button class="playlist-btn active" data-type="local" data-src="HOLOGRAPHIC_DAWN_MVFORSOCIALS_POST.mp4">HOLOGRAPHIC DAWN</button>
                    <button class="playlist-btn" data-type="youtube" data-src="https://www.youtube.com/embed/j6G2yc-H05A?autoplay=1">THE AWAKENING</button>
                </div>
                <div class="video-container" style="position: relative; padding-bottom: 56.25%; height: 0;">
                    <video id="launch-video" controls style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;">
                        <source src="HOLOGRAPHIC_DAWN_MVFORSOCIALS_POST.mp4" type="video/mp4">
                        Your browser does not support the video tag.
                    </video>
                    <iframe id="youtube-player" style="display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none;" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                </div>
            </div>
        </div>
    </div>
    <audio id="bg-audio" loop>
        <source src="HIGH_ENERGY_ARCADE_LANDING.m4a" type="audio/mp4">
    </audio>
    <script src="main.js"></script>
</body>
</html>
