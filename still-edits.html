<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeverRender Labs - Still Edits</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .character-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            padding: 40px;
            overflow-y: auto;
            max-height: 70vh;
        }
        .character-card {
            background: rgba(18, 69, 89, 0.2);
            border: 1px solid rgba(0, 229, 255, 0.2);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
        }
        .character-card:hover {
            border-color: var(--color-energy-cyan);
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.2);
            transform: translateY(-5px);
        }
        .character-img-wrapper {
            width: 100%;
            height: 250px;
            min-height: 250px;
            flex-shrink: 0;
            overflow: hidden;
        }
        .character-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        .character-card:hover .character-img {
            transform: scale(1.05);
        }
        .character-info {
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }
        .character-name {
            font-size: 1.2rem;
            color: var(--color-energy-cyan);
            margin-bottom: 10px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .header-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            border-bottom: 1px solid rgba(0, 229, 255, 0.1);
        }
        .back-btn {
            background: transparent;
            border: 1px solid var(--color-coral-pink);
            color: var(--color-coral-pink);
            padding: 10px 20px;
            cursor: pointer;
            font-family: inherit;
            letter-spacing: 1px;
        }
        .back-btn:hover {
            background: var(--color-coral-pink);
            color: #fff;
            box-shadow: 0 0 15px rgba(255, 107, 107, 0.4);
        }
        @media (max-width: 768px) {
            .character-gallery {
                grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
                padding: 15px;
                gap: 15px;
            }
            .header-nav {
                flex-direction: column;
                gap: 15px;
                text-align: center;
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <!-- Background plate for bokeh/blur -->
    <div class="background-plate"></div>
    
    <!-- Energy Conduits -->
    <div class="conduit-grid">
        <div class="conduit-line horizontal top"></div>
        <div class="conduit-line vertical left"></div>
        <div class="conduit-line horizontal bottom"></div>
        <div class="conduit-line vertical right"></div>
    </div>

    <div class="viewport-container" style="max-width: 1400px; padding: 20px;">
        <div class="glass-panel" style="padding: 0; display: flex; flex-direction: column; height: 90vh;">
            
            <div class="header-nav">
                <div>
                    <h1 class="chromatic-aberration" style="font-size: 2rem; margin-bottom: 5px;">STILL EDITS</h1>
                    <p class="subtitle" style="font-size: 0.9rem;">RESTRICTED ACCESS: CLEARANCE GRANTED</p>
                </div>
                <button class="back-btn" onclick="window.location.href='index.html'">[x] RETURN TO TERMINAL</button>
            </div>

            <div class="character-gallery">

                <a href="STILL_EDITS/Gemini_Generated_Image_rwoirhrwoirhrwoi.jpg" target="_blank" style="text-decoration: none; color: inherit; display: block;">
                    <div class="character-card">
                        <div class="character-img-wrapper">
                            <img src="STILL_EDITS/Gemini_Generated_Image_rwoirhrwoirhrwoi.jpg" alt="Gemini Generated Image Rwoirhrwoirhrwoi" class="character-img">
                        </div>
                        <div class="character-info">
                            <div class="character-name">Gemini Generated Image Rwoirhrwoirhrwoi</div>
                        </div>
                    </div>
                </a>

                <a href="MOTION_EDITS/WOOLY_FINGERS/WOOLY_FINGERS_YT_JBANNERP 2026-06-28 - 10.55.12 - Cr.jpg" target="_blank" style="text-decoration: none; color: inherit; display: block;">
                    <div class="character-card">
                        <div class="character-img-wrapper">
                            <img src="MOTION_EDITS/WOOLY_FINGERS/WOOLY_FINGERS_YT_JBANNERP 2026-06-28 - 10.55.12 - Cr.jpg" alt="Wooly Fingers" class="character-img">
                        </div>
                        <div class="character-info">
                            <div class="character-name">WOOLY FINGERS</div>
                        </div>
                    </div>
                </a>

            </div>
            
            <div style="padding: 20px 40px; border-top: 1px solid rgba(0, 229, 255, 0.1); font-family: monospace; font-size: 0.8rem; color: var(--color-energy-cyan);">
                // SYSTEM STATUS: CEMENTED
            </div>
        </div>
    </div>
</body>
</html>
